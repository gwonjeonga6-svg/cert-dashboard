<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4주기 인증조사 평가 시스템</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','맑은 고딕',sans-serif;background:#f5f6f8;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;}
.wrap{max-width:560px;width:100%;text-align:center;}
.badge{font-size:11px;font-weight:700;letter-spacing:.12em;color:#9199a8;text-transform:uppercase;margin-bottom:10px;}
h1{font-size:26px;font-weight:900;color:#111827;margin-bottom:8px;letter-spacing:-.3px;}
.sub{font-size:14px;color:#6b7280;margin-bottom:40px;}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:32px;}
.card{background:#fff;border:1px solid #dde1e9;border-radius:12px;padding:28px 24px;text-decoration:none;color:inherit;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:10px;}
.card:hover{border-color:#1a5fa8;box-shadow:0 4px 20px rgba(26,95,168,0.12);transform:translateY(-2px);}
.card-icon{font-size:36px;}
.card-title{font-size:15px;font-weight:800;color:#111827;}
.card-desc{font-size:12px;color:#9199a8;line-height:1.6;text-align:center;}
.card-btn{margin-top:6px;padding:7px 18px;background:#1a5fa8;color:#fff;border-radius:6px;font-size:12px;font-weight:700;}
.card:hover .card-btn{background:#0f4080;}
.footer{font-size:11px;color:#9199a8;}
</style>
</head>
<body>
<div class="wrap">
  <div class="badge">4주기 의료기관 인증조사</div>
  <h1>인증조사 평가 시스템</h1>
  <p class="sub">92기준 · 505항목 · 5,050점 만점 | QPS실 내선 9422</p>
  <div class="cards">
    <a class="card" href="cert-input.html">
      <div class="card-icon">📥</div>
      <div class="card-title">점수 입력</div>
      <div class="card-desc">장별 상/중/하 입력<br>인증 4대 요건 실시간 체크<br>보고용 파일 내보내기</div>
      <div class="card-btn">입력 시작 →</div>
    </a>
    <a class="card" href="cert-report.html">
      <div class="card-icon">📊</div>
      <div class="card-title">보고용 대시보드</div>
      <div class="card-desc">JSON 불러오기로 자동 생성<br>차트·인증요건·개선과제<br>인쇄/PDF 저장</div>
      <div class="card-btn">대시보드 보기 →</div>
    </a>
  </div>
  <div class="footer">의료기관평가인증원 4주기 표준지침서 기준</div>
</div>
</body>
</html>
